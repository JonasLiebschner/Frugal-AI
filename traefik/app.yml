http:
  routers:
    dashboard-api:
      rule: "Host(`srv1513085.hstgr.cloud`) && PathPrefix(`/api`)"
      entryPoints:
        - websecure
      service: dashboard-api
      tls:
        certResolver: letsencrypt

    dashboard-web:
      rule: "Host(`srv1513085.hstgr.cloud`)"
      entryPoints:
        - websecure
      service: dashboard-web
      priority: 1
      tls:
        certResolver: letsencrypt

    jaeger-ui:
      rule: "Host(`srv1513085.hstgr.cloud`) && PathPrefix(`/jaeger`)"
      entryPoints:
        - websecure
      service: jaeger-ui
      priority: 10
      tls:
        certResolver: letsencrypt

    opensearch-api:
      rule: "Host(`srv1513085.hstgr.cloud`) && PathPrefix(`/opensearch`)"
      entryPoints:
        - websecure
      service: opensearch-api
      middlewares:
        - strip-opensearch-prefix
      priority: 10
      tls:
        certResolver: letsencrypt

    middleware-simple:
      rule: "Host(`srv1513085.hstgr.cloud`) && PathPrefix(`/middlewares/simple`)"
      entryPoints:
        - websecure
      service: middleware-simple
      middlewares:
        - strip-middleware-simple-prefix
      priority: 10
      tls:
        certResolver: letsencrypt

    middleware-onnx:
      rule: "Host(`srv1513085.hstgr.cloud`) && PathPrefix(`/middlewares/onnx`)"
      entryPoints:
        - websecure
      service: middleware-onnx
      middlewares:
        - strip-middleware-onnx-prefix
      priority: 10
      tls:
        certResolver: letsencrypt

    middleware-llm:
      rule: "Host(`srv1513085.hstgr.cloud`) && PathPrefix(`/middlewares/llm`)"
      entryPoints:
        - websecure
      service: middleware-llm
      middlewares:
        - strip-middleware-llm-prefix
      priority: 10
      tls:
        certResolver: letsencrypt

    middleware-vs:
      rule: "Host(`srv1513085.hstgr.cloud`) && PathPrefix(`/middlewares/vs`)"
      entryPoints:
        - websecure
      service: middleware-vs
      middlewares:
        - strip-middleware-vs-prefix
      priority: 10
      tls:
        certResolver: letsencrypt

    http-catchall:
      rule: "HostRegexp(`{host:.+}`)"
      entryPoints:
        - web
      middlewares:
        - redirect-to-https
      service: noop@internal

  middlewares:
    redirect-to-https:
      redirectScheme:
        scheme: https
        permanent: true
    strip-opensearch-prefix:
      stripPrefix:
        prefixes:
          - /opensearch
    strip-middleware-simple-prefix:
      stripPrefix:
        prefixes:
          - /middlewares/simple
    strip-middleware-onnx-prefix:
      stripPrefix:
        prefixes:
          - /middlewares/onnx
    strip-middleware-llm-prefix:
      stripPrefix:
        prefixes:
          - /middlewares/llm
    strip-middleware-vs-prefix:
      stripPrefix:
        prefixes:
          - /middlewares/vs

  services:
    dashboard-api:
      loadBalancer:
        servers:
          - url: "http://dashboard-backend:8080"

    dashboard-web:
      loadBalancer:
        servers:
          - url: "http://dashboard-frontend:80"

    jaeger-ui:
      loadBalancer:
        servers:
          - url: "http://jaeger:16686"

    opensearch-api:
      loadBalancer:
        servers:
          - url: "http://opensearch:9200"

    middleware-simple:
      loadBalancer:
        servers:
          - url: "http://middleware-simple:3000"

    middleware-onnx:
      loadBalancer:
        servers:
          - url: "http://middleware-onnx:3001"

    middleware-llm:
      loadBalancer:
        servers:
          - url: "http://middleware-llm:3002"

    middleware-vs:
      loadBalancer:
        servers:
          - url: "http://middleware-vs:3003"
