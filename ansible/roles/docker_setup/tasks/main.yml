---
# Task 3.1: Install prerequisite packages
- name: Install prerequisite packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: yes

# Task 3.2: Add Docker GPG key (modern signed-by approach)
- name: Create keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Download Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'

# Task 3.3: Add Docker apt repository
- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
    filename: docker

# Task 3.4: Install Docker packages
- name: Install Docker Engine and Compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: yes

# Task 3.5: Enable and start Docker service
- name: Enable and start Docker service
  ansible.builtin.systemd:
    name: docker
    enabled: yes
    state: started

# Task 3.6: Verify Docker and Compose versions
- name: Get Docker version
  ansible.builtin.command: docker --version
  register: docker_version
  changed_when: false

- name: Get Docker Compose version
  ansible.builtin.command: docker compose version
  register: docker_compose_version
  changed_when: false

- name: Print Docker version
  ansible.builtin.debug:
    msg: "{{ docker_version.stdout }}"

- name: Print Docker Compose version
  ansible.builtin.debug:
    msg: "{{ docker_compose_version.stdout }}"
