services:
  dashboard-backend:
    build: dashboard/backend
    ports:
      - "8080:8080"
    volumes:
      - ./dashboard/backend/data:/data
  dashboard-frontend:
    build: dashboard/frontend
    ports:
      - "4200:4200"
    volumes:
      - ./dashboard/frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: pnpm run start

  # --- Observability stack ---
  victoriatraces:
    image: victoriametrics/victoria-traces:latest
    container_name: victoriatraces
    ports:
      - "10428:10428"
    command:
      - "-storageDataPath=/storage"
      - "-retentionPeriod=14d"
    volumes:
      - vt-data:/storage
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:10428/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  jaeger:
    image: jaegertracing/all-in-one:1.76.0
    ports:
      - "16686:16686"
      - "14250:14250"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - QUERY_BASE_PATH=/jaeger
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:14269/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  # --- Middlewares ---
  middleware-simple:
    build: ./classifier
    environment:
      - MIDDLEWARE=simple
    ports:
      - "3000:3000"
  middleware-onnx:
    build: ./classifier
    environment:
      - MIDDLEWARE=onnx
    ports:
      - "3001:3001"
    volumes:
      - ./classifier/models:/models
  middleware-llm:
    build: ./classifier
    environment:
      - MIDDLEWARE=llm
      - LLM_BASE_URL=${MIDDLEWARE_LLM_BASE_URL:-https://api.openai.com/v1}
      - LLM_API_KEY=${MIDDLEWARE_LLM_API_KEY:-}
      - LLM_MODEL=${MIDDLEWARE_LLM_MODEL:-gpt-4o-mini}
    ports:
      - "3002:3002"
  middleware-svc:
    build:
      context: ./classifier
      dockerfile: packages/svc-middleware/Dockerfile
    ports:
      - "3004:3004"
  middleware-vs:
    build:
      context: ./classifier
      dockerfile: vs-middleware/Dockerfile
    ports:
      - "3003:3003"
    environment:
      - MONGODB_URI=${MIDDLEWARE_VS_MONGODB_URI:-}
      - MONGODB_API_KEY=${MIDDLEWARE_VS_MONGODB_API_KEY:-}
      - MONGODB_DATABASE=${MIDDLEWARE_VS_MONGODB_DATABASE:-frugal}

volumes:
  vt-data:

