services:
  dashboard-backend:
    build: dashboard/backend
    ports:
      - "8080:8080"
  dashboard-frontend:
    build: dashboard/frontend
    ports:
      - "4200:4200"

  # --- Observability stack ---
  opensearch:
    image: opensearchproject/opensearch:3.5.0
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
    ports:
      - "9200:9200"
      - "9600:9600"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 10s
      timeout: 5s
      retries: 6

  jaeger:
    image: jaegertracing/all-in-one:1.76.0
    ports:
      - "16686:16686"
      - "14250:14250"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - QUERY_BASE_PATH=/jaeger
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:14269/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
      
  # --- Middlewares ---
  middleware-simple:
    build:
      context: ./classifier
      dockerfile: packages/simple-middleware/Dockerfile
    ports:
      - "3000:3000"
  middleware-onnx:
    build:
      context: ./classifier
      dockerfile: packages/onnx-middleware/Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - ./classifier/models:/models
