services:
  dashboard-backend:
    image: ghcr.io/jonasliebschner/frugal-ai.dashboard.backend
    volumes:
      - ./dashboard-backend:/data

  dashboard-frontend:
    image: ghcr.io/jonasliebschner/frugal-ai.dashboard.frontend

  llmproxy:
    image: ghcr.io/jonasliebschner/frugal-ai-llmproxy
    environment:
      - DATA_DIR=/data
    volumes:
      - ./llmproxy:/data

  middleware-simple:
    image: ghcr.io/jonasliebschner/frugal-ai-middleware
    environment:
      - MIDDLEWARE=simple

  middleware-onnx:
    image: ghcr.io/jonasliebschner/frugal-ai-middleware
    environment:
      - MIDDLEWARE=onnx
    volumes:
      - ./models:/models

  middleware-llm:
    image: ghcr.io/jonasliebschner/frugal-ai-middleware
    environment:
      - MIDDLEWARE=llm
      - LLM_BASE_URL=${MIDDLEWARE_LLM_BASE_URL:-https://api.openai.com/v1}
      - LLM_API_KEY=${MIDDLEWARE_LLM_API_KEY}
      - LLM_MODEL=${MIDDLEWARE_LLM_MODEL:-gpt-4o-mini}

  middleware-vs:
    image: ghcr.io/jonasliebschner/frugal-ai-middleware-vs
    environment:
      - MONGODB_URI=${MIDDLEWARE_VS_MONGODB_URI}
      - MONGODB_API_KEY=${MIDDLEWARE_VS_MONGODB_API_KEY}
      - MONGODB_DATABASE=${MIDDLEWARE_VS_MONGODB_DATABASE:-frugal}

  middleware-svc:
    image: ghcr.io/jonasliebschner/frugal-ai-middleware-svc
    environment:
      - SVC_ENABLE_DEBUG_ENDPOINTS=false

  middleware-oldschool:
    image: ghcr.io/jonasliebschner/frugal-ai-middleware-oldschool

  reverse-proxy:
    image: traefik:v3.3
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/app.yml:/etc/traefik/dynamic/app.yml:ro
      - ./traefik/acme.json:/letsencrypt/acme.json

  victoriatraces:
    image: victoriametrics/victoria-traces:latest
    container_name: victoriatraces
    command:
      - "-storageDataPath=/storage"
      - "-retentionPeriod=14d"
    volumes:
      - ./vt-data:/storage
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:10428/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
