name: Build and deploy

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/frugal-ai.dashboard.backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/frugal-ai.dashboard.frontend
  SIMPLE_IMAGE: ghcr.io/${{ github.repository_owner }}/frugal-ai-middleware-simple
  ONNX_IMAGE: ghcr.io/${{ github.repository_owner }}/frugal-ai-middleware-onnx
  LLM_IMAGE: ghcr.io/${{ github.repository_owner }}/frugal-ai-middleware-llm

jobs:
  build:
    name: Build Docker images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (backend)
        id: meta_backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Docker metadata (frontend)
        id: meta_frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Docker metadata (simple-middleware)
        id: meta_simple
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.SIMPLE_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Docker metadata (onnx-middleware)
        id: meta_onnx
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ONNX_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Docker metadata (llm-middleware)
        id: meta_llm
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.LLM_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./dashboard/backend
          file: ./dashboard/backend/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./dashboard/frontend
          file: ./dashboard/frontend/Dockerfile.prod
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push simple-middleware image
        uses: docker/build-push-action@v6
        with:
          context: ./classifier
          file: ./classifier/packages/simple-middleware/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta_simple.outputs.tags }}
          labels: ${{ steps.meta_simple.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push onnx-middleware image
        uses: docker/build-push-action@v6
        with:
          context: ./classifier
          file: ./classifier/packages/onnx-middleware/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta_onnx.outputs.tags }}
          labels: ${{ steps.meta_onnx.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push llm-middleware image
        uses: docker/build-push-action@v6
        with:
          context: ./classifier
          file: ./classifier/packages/llm-middleware/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta_llm.outputs.tags }}
          labels: ${{ steps.meta_llm.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure target exists
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            mkdir -p "${{ secrets.DEPLOY_PATH }}/traefik"

      - name: Copy deployment files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "docker-compose.prod.yml,traefik/traefik.yml,traefik/app.yml"
          target: ${{ secrets.DEPLOY_PATH }}
          overwrite: true

      - name: Deploy services
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            export MIDDLEWARE_LLM_BASE_URL="${{ secrets.MIDDLEWARE_LLM_BASE_URL }}"
            export MIDDLEWARE_LLM_API_KEY="${{ secrets.MIDDLEWARE_LLM_API_KEY }}"
            export MIDDLEWARE_LLM_MODEL="${{ secrets.MIDDLEWARE_LLM_MODEL }}"
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
