name: Build and deploy

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/frugal-ai.dashboard.backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/frugal-ai.dashboard.frontend
  MIDDLEWARE_IMAGE: ghcr.io/${{ github.repository_owner }}/frugal-ai-middleware
  VS_IMAGE: ghcr.io/${{ github.repository_owner }}/frugal-ai-middleware-vs
  SVC_IMAGE: ghcr.io/${{ github.repository_owner }}/frugal-ai-middleware-svc

jobs:
  build:
    name: Build Docker images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (backend)
        id: meta_backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Docker metadata (frontend)
        id: meta_frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Docker metadata (middleware)
        id: meta_middleware
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.MIDDLEWARE_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./dashboard/backend
          file: ./dashboard/backend/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./dashboard/frontend
          file: ./dashboard/frontend/Dockerfile.prod
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push middleware image
        uses: docker/build-push-action@v6
        with:
          context: ./classifier
          file: ./classifier/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta_middleware.outputs.tags }}
          labels: ${{ steps.meta_middleware.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker metadata (vs-middleware)
        id: meta_vs
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.VS_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push vs-middleware image
        uses: docker/build-push-action@v6
        with:
          context: ./classifier
          file: ./classifier/vs-middleware/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta_vs.outputs.tags }}
          labels: ${{ steps.meta_vs.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push llmproxy image
        uses: docker/build-push-action@v6
        with:
          context: ./llmproxy
          file: ./llmproxy/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.llmproxy.outputs.tags }}
          labels: ${{ steps.llmproxy.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


      - name: Docker metadata (svc-middleware)
        id: meta_svc
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.SVC_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push svc-middleware image
        uses: docker/build-push-action@v6
        with:
          context: ./classifier
          file: ./classifier/packages/svc-middleware/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta_svc.outputs.tags }}
          labels: ${{ steps.meta_svc.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure target exists
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            mkdir -p "${{ secrets.DEPLOY_PATH }}/traefik"
            mkdir -p "${{ secrets.DEPLOY_PATH }}/dashboard-backend"
            [ -e "${{ secrets.DEPLOY_PATH }}/dashboard-backend/stars.json" ] || touch "${{ secrets.DEPLOY_PATH }}/dashboard-backend/stars.json"
            chmod -R 777 "${{ secrets.DEPLOY_PATH }}/dashboard-backend"

      - name: Copy deployment files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "docker-compose.prod.yml,traefik/traefik.yml,traefik/app.yml"
          target: ${{ secrets.DEPLOY_PATH }}
          overwrite: true

      - name: Deploy services
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            export MIDDLEWARE_LLM_BASE_URL="${{ secrets.MIDDLEWARE_LLM_BASE_URL }}"
            export MIDDLEWARE_LLM_API_KEY="${{ secrets.MIDDLEWARE_LLM_API_KEY }}"
            export MIDDLEWARE_LLM_MODEL="${{ secrets.MIDDLEWARE_LLM_MODEL }}"
            export MIDDLEWARE_VS_MONGODB_URI="${{ secrets.MIDDLEWARE_VS_MONGODB_URI }}"
            export MIDDLEWARE_VS_MONGODB_API_KEY="${{ secrets.MIDDLEWARE_VS_MONGODB_API_KEY }}"
            export MIDDLEWARE_VS_MONGODB_DATABASE="${{ secrets.MIDDLEWARE_VS_MONGODB_DATABASE }}"
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
